appId: com.example.danmaku
productName: DanmakuElectron
directories:
  output: dist
files:
  - main.js
  - index.html
  - worker.js
  - tray.png
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
mac:
  target:
    - target: dmg
      arch:
        - arm64
  artifactName: "danmaku-electron-${version}-${arch}.${ext}"
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "DanmakuElectron-Setup-${version}.${ext}"
