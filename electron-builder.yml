appId: com.example.danmaku
productName: DanmakuElectron
directories:
  output: dist
files:
  - main.js
  - index.html
  - worker.js
  - tray.png
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.png
mac:
  target:
    - dmg
  icon: build/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
