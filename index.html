<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>Danmaku</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: sans-serif;
    }

    /* スプラッシュ画面 */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      /* 背景を完全に透明に */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 1000;
      transition: opacity 1s ease-out, visibility 1s;
      text-align: center;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .splash-content {
      width: 600px;
      /* サイズ固定 */
      min-height: 450px;
      /* 高さも余裕を持って固定 */
      padding: 40px;
      border-radius: 30px;
      background: rgba(15, 15, 35, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      /* 内容を分散配置して高さを安定させる */
    }

    .splash-title {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(to right, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    .instruction {
      font-size: 16px;
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .status-text {
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #3498db;
      margin-bottom: 20px;
      height: 20px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    .comment {
      position: absolute;
      white-space: nowrap;
      font-size: 72px;
      color: #fff;
      animation: scroll-left 16s linear forwards;
      font-weight: bold;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
    }

    @keyframes scroll-left {
      from {
        left: 100%;
      }

      to {
        left: -100%;
      }
    }
  </style>
</head>

<body>
  <!-- スプラッシュ画面 -->
  <div id="splash">
    <div class="splash-content">
      <div class="splash-title">Gemma Live</div>
      <div class="loader"></div>
      <div class="status-text" id="load-status">Downloading AI Model...</div>
      <div class="instruction">
        <p>デスクトップ画面をAIがリアルタイムに実況します。</p>
        <p>モデル（約2GB）の初回ロードが完了するまでお待ちください。<br>
          完了後、自動的にこの画面は消え、画面にコメントが流れ始めます。</p>
      </div>
    </div>
  </div>

  <div id="wrapper">
    <div id="status" style="position:fixed; bottom:10px; right:10px; color:rgba(255,255,255,0.5); font-size:12px;">AI
      Initializing...</div>
    <div id="marquee"></div>
  </div>
  <script>
    const JOBS = [
      "男子大学生", "女子高生", "マセた小学生", "会社員", "主婦", "プロゲーマー", "AIの妖精", "エンジニア", "隠居した老人",
      "メン地下アイドル", "崖っぷちYouTuber", "異世界から来た騎士", "自称・魔導師", "深夜テンションのプログラマー", 
      "宇宙から来た視察員", "記憶喪失の旅人", "恋に落ちたばかりの乙女", "自意識過剰な詩人", "敏腕刑事", "謎の占い師", 
      "転生したスライム", "窓際族のサラリーマン", "意識高い系起業家", "借金まみれのギャンブラー"
    ];
    const PERSONALITIES = [
      "無気力な", "超ポジティブな", "かなりの毒舌家な", "めちゃくちゃ丁寧な", "常にテンションが高い", "中二病な", "心配性な", "好奇心旺盛な",
      "ツンデレな", "ギャル気質な", "古風な武士言葉の", "極低血圧な", "常に喧嘩腰の", "悟りすぎた", "語彙力が死んでいる", "理屈っぽい", 
      "ナルシストな", "メンヘラ気味な", "腰が低すぎる", "上から目線の"
    ];
    const MOODS = [
      "暇を持て余している", "お腹が空いている", "眠たそうな", "悟りを開いている", "何かを探している", "イライラしている",
      "宝くじに当たったかのような", "絶望の淵にいる", "ゾーンに入っている", "猛烈に腹痛に襲われている", "自分がAIだと疑っている", 
      "世界を滅ぼしたい", "新しい恋をしたい", "明日から本気出したい", "前世を思い出しかけている"
    ];
    const MANNERISMS = [
      "語尾に『～じゃ』をつける", "ネットスラング（w, 草, 乙など）を多用する", "常にカタカナ英語を混ぜる", "独り言が漏れているような口調", 
      "『……ッ！』と溜めることが多い", "丁寧すぎて逆に失礼な敬語", "ギャル語（まじ、尊い、～かよなど）で話す", "古風な言葉遣い（貴殿、然様か、候など）",
      "三点リーダー（…）を多用する", "『ふふ、』と不敵に笑う", "倒置法を使いすぎる", "専門用語を無理やり使いたがる"
    ];

    function generateCharacter() {
      const job = JOBS[Math.floor(Math.random() * JOBS.length)];
      const personality = PERSONALITIES[Math.floor(Math.random() * PERSONALITIES.length)];
      const mood = MOODS[Math.floor(Math.random() * MOODS.length)];
      const mannerism = MANNERISMS[Math.floor(Math.random() * MANNERISMS.length)];
      
      return {
        name: `${personality}${job}`,
        profile: `【性格】${personality} 【立場】${job} 【今の気分】${mood} 【口癖/特徴】${mannerism}`
      };
    }

    const CHARACTER_COUNT = 6;
    const activeCharacters = Array.from({ length: CHARACTER_COUNT }, () => generateCharacter());
    let lastSentCharacter = activeCharacters[0];
    console.log("Active Characters:", activeCharacters.map(c => c.name));

    const { ipcRenderer } = require('electron');

    function updateStatus(text) {
      ipcRenderer.send('update-status', text);
    }

    let worker = null;
    let isReady = false;
    let isProcessing = false;
    let inferenceTimeout = null;
    let frameBuffer = [];
    const commentHistory = [];
    const MAX_HISTORY = 5;
    const MAX_FRAMES = 1;
    const CAPTURE_INTERVAL = 3000; // 3秒ごとにキャプチャ
    const INFERENCE_INTERVAL = 10000; // 10秒ごとに推論

    const fallbackComments = [
      "うーん、よく見えないな...",
      "ちょっと何が起きてるかわからないかも",
      "画面が眩しい...",
      "なんだかぼんやりしてるね",
      "解析エラーかしら？よく見えないです",
      "...（じーっと見ている）",
      "今はちょっと休憩中かな？",
      "おや、画面が真っ暗？",
      "ちょっと見失っちゃった"
    ];

    const marquee = document.getElementById('marquee');

    function initWorker() {
      worker = new Worker('worker.js');
      worker.onmessage = (e) => {
        const { type, payload, error } = e.data;
        if (type === 'progress') {
          const statusEl = document.getElementById('load-status');
          if (payload.status === 'progress') {
            const percent = payload.progress.toFixed(1);
            const text = `DL: ${percent}% (${payload.file})`;
            statusEl.textContent = text;
            updateStatus(text);
          } else if (payload.status === 'initiate') {
            statusEl.textContent = `Initiating: ${payload.file}...`;
          } else if (payload.status === 'done') {
            statusEl.textContent = `Loaded: ${payload.file}`;
          } else if (payload.status === 'status') {
            statusEl.textContent = payload.text;
            updateStatus(payload.text);
          }
        } else if (type === 'ready') {
          isReady = true;
          console.log('AI System Ready');
          document.getElementById('status').textContent = 'AI System Active';
          updateStatus('AIアクティブ（解析中）');
          const splash = document.getElementById('splash');
          
          // キャラクター紹介を表示してから隠す
          const statusEl = document.getElementById('load-status');
          if (statusEl) {
            statusEl.style.color = '#00d2ff';
            statusEl.textContent = "参加メンバーを表示中...";
            
            setTimeout(() => {
              statusEl.textContent = activeCharacters.map(c => c.name).join('、');
              statusEl.style.fontSize = '12px';
              statusEl.style.whiteSpace = 'normal';
              statusEl.style.height = 'auto';
            }, 1000);
          }
          
          setTimeout(() => {
            splash.classList.add('hidden');
          }, 5000);

          showComment("システム", `${activeCharacters.length}人のメンバーがログインしました。`);

          // リソースの衝突を避けるために少し待機してからキャプチャ開始
          setTimeout(() => {
            startCapture();
          }, 3000);
        } else if (type === 'result') {
          isProcessing = false;
          if (inferenceTimeout) clearTimeout(inferenceTimeout);
          updateStatus('AIアクティブ（解析中）');
          
          let text = payload.text;
          if (!text || text.length < 2) {
            text = fallbackComments[Math.floor(Math.random() * fallbackComments.length)];
          } else {
            // 履歴に追加
            commentHistory.push(text);
            if (commentHistory.length > MAX_HISTORY) commentHistory.shift();
          }
          showComment(lastSentCharacter.name, text);
        } else if (type === 'error') {
          isProcessing = false;
          if (inferenceTimeout) clearTimeout(inferenceTimeout);
          console.error('Worker Error:', error);
          const statusEl = document.getElementById('load-status');
          if (statusEl) {
            statusEl.textContent = `Error: ${error}`;
            statusEl.style.color = '#ff6b6b';
          }

          // 推論中のエラーであれば、当たり障りないコメントを出す
          const text = fallbackComments[Math.floor(Math.random() * fallbackComments.length)];
          showComment(lastSentCharacter.name, text);
          updateStatus(`AIエラー: ${error}`);
          console.warn('Fallback due to worker error:', error);
        }
      };
      worker.postMessage({ type: 'init' });
    }

    function showComment(name, text) {
      const isSystem = name === "システム" || name === "エラー";
      const fullText = isSystem ? text : `${name}「${text}」`;
      const el = document.createElement('div');
      el.className = 'comment';
      el.textContent = fullText;

      const maxY = window.innerHeight * 0.8;
      const yPos = Math.random() * maxY;
      el.style.top = `${yPos}px`;

      // 文字色をランダムにする（視認性向上のため）
      const colors = ['#fff', '#f0f', '#0ff', '#0f0', '#ff0'];
      el.style.color = colors[Math.floor(Math.random() * colors.length)];
      el.style.textShadow = '2px 2px 4px #000';

      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    async function startCapture() {
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: { width: 448, height: 448 },
          audio: false
        });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();

        // 定期的にフレームをバッファに追加
        setInterval(async () => {
          if (video.readyState >= 2) {
            const bitmap = await createImageBitmap(video, {
              resizeWidth: 448,
              resizeHeight: 448
            });
            frameBuffer.push(bitmap);
            if (frameBuffer.length > MAX_FRAMES) {
              const old = frameBuffer.shift();
              old.close();
            }
          }
        }, CAPTURE_INTERVAL);

        // 定期的に推論
        setInterval(() => {
          if (isReady && frameBuffer.length >= 1 && !isProcessing) {
            isProcessing = true;

            // タイムアウト監視（30秒でリセット）
            if (inferenceTimeout) clearTimeout(inferenceTimeout);
            inferenceTimeout = setTimeout(() => {
              if (isProcessing) {
                console.warn('Inference timed out. Resetting...');
                isProcessing = false;
                updateStatus('AI応答タイムアウト（リセット中）');
                document.getElementById('status').textContent = 'AI Status: Timeout/Reset';
                document.getElementById('status').textContent = 'AI Status: Timeout/Reset';
                showComment(lastSentCharacter.name, "...ちょっと考えすぎちゃった。");
              }
            }, 40000); // 40秒くらいまで待つ（GPU負荷を考慮）

            // ImageBitmapの配列を転送 (Zero-copy)
            const snapshots = [...frameBuffer];
            const statusText = '実況考案中...';
            updateStatus(statusText);
            document.getElementById('status').textContent = `AI Status: ${statusText}`;

            // ベースの指示をランダムに変えてバリエーションを出す
            const promptVariations = [
              "画面を見て、素直な感想を一言でつぶやいてください。",
              "画面から読み取れる状況に対して、一言ボヤいてください。",
              "今の画面の状態を、あなたなりの視点で評価してください。",
              "画面の中で一番目立っているものについて、何か言ってください。",
              "この画面を見て、ふと思ったことを口に出してください。"
            ];
            const basePrompt = promptVariations[Math.floor(Math.random() * promptVariations.length)];
            
            const isDescription = Math.random() < 0.01;
            const promptText = isDescription
              ? "現在の画面に何が映っているか、口語調で短く説明してください。"
              : `${basePrompt} 説明は不要です。リアクションや心の声をお願いします。`;

            // ランダムにキャラクターを選択
            lastSentCharacter = activeCharacters[Math.floor(Math.random() * activeCharacters.length)];

            worker.postMessage({
              type: 'generate',
              payload: {
                images: snapshots,
                promptText: promptText,
                characterProfile: lastSentCharacter.profile,
                history: commentHistory
              }
            }, snapshots);

            // 送信した分はクリア
            frameBuffer = [];
          }
        }, INFERENCE_INTERVAL);

      } catch (err) {
        console.error('Error starting capture:', err);
        showComment("エラー", "画面キャプチャの開始に失敗しました。");
      }
    }

    // 開始
    initWorker();
  </script>
</body>

</html>
